# Alembic configuration for DRONA AI.
#
# The database URL is intentionally NOT hardcoded here. ``alembic/env.py``
# resolves it at runtime from ``app.core.config.get_settings().DATABASE_URL``
# (SQLite locally, the Render-managed PostgreSQL ``DATABASE_URL`` on deploy),
# so secrets and connection strings never live in version control.

[alembic]
# Path to migration scripts, relative to this file's directory.
script_location = alembic

# Template used to generate migration file names; prefix with a UTC date so
# revisions sort chronologically.
file_template = %%(year)d%%(month).2d%%(day).2d_%%(rev)s_%%(slug)s

# Use os.pathsep-separated paths; "." adds the backend root to sys.path so
# ``import app...`` works when running ``alembic`` from the backend directory.
prepend_sys_path = .

# Treat timestamps in file_template as UTC.
timezone = UTC

# sqlalchemy.url is resolved in env.py from app settings; leave blank here.
sqlalchemy.url =

[post_write_hooks]
# (none configured)

# Logging configuration.
[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
