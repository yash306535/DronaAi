# Render Blueprint for the DRONA AI backend.
# Docs: https://render.com/docs/blueprint-spec
#
# Deploy from the repository's `backend/` directory. This provisions:
#   1. A managed PostgreSQL database (drona-db).
#   2. A Python web service running FastAPI via uvicorn.
#
# Secrets are NEVER hardcoded here. Values marked `sync: false` are entered
# once in the Render dashboard (or via the Render API) and stored encrypted;
# DATABASE_URL is injected automatically from the managed database.
#
# Run database migrations on each deploy via the preDeployCommand
# (`alembic upgrade head`) so the schema always matches the models.

databases:
  - name: drona-db
    databaseName: drona
    plan: free
    # Render manages credentials; the connection string is exposed to the
    # web service through the `fromDatabase` reference below.

services:
  - type: web
    name: drona-api
    runtime: python
    plan: free
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    # Apply migrations before the new instance starts serving traffic.
    preDeployCommand: alembic upgrade head
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      # --- Database (injected from the managed PostgreSQL above) ---
      - key: DATABASE_URL
        fromDatabase:
          name: drona-db
          property: connectionString

      # --- Required secrets (entered in the dashboard; never committed) ---
      - key: JWT_SECRET
        sync: false
      - key: OPENAI_API_KEY
        sync: false

      # --- Optional secrets (leave unset to disable the related feature) ---
      - key: ANTHROPIC_API_KEY
        sync: false
      - key: SMTP_PASSWORD
        sync: false

      # --- Non-secret application configuration ---
      - key: ENVIRONMENT
        value: production
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_TTL_MINUTES
        value: "15"
      - key: REFRESH_TOKEN_TTL_DAYS
        value: "7"
      # CORS allowlist: set to the deployed Vercel frontend origin(s),
      # comma-separated. Update after the frontend is deployed.
      - key: FRONTEND_ORIGINS
        sync: false
      - key: MAX_BODY_BYTES
        value: "1048576"

      # --- SMTP (optional Herald email channel; leave unset to disable) ---
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        value: "587"
      - key: SMTP_USERNAME
        sync: false

      # Pin the Python runtime to match the backend (Python 3.11).
      - key: PYTHON_VERSION
        value: "3.11.9"
